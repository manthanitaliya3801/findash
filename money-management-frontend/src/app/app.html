<div class="app-container" [class.sidebar-collapsed]="isSidebarCollapsed()">
    <!-- Sidebar Component -->
    <app-sidebar [isAdmin]="isAdmin()" [isMobileView]="isMobile()" [showSidebar]="showSidebar()"
        [isSidebarCollapsed]="isSidebarCollapsed()" (logoutEvent)="logout()" (openQuickAddEvent)="openQuickAdd()">
    </app-sidebar>

    <!-- Main Content Area -->
    <main class="main-content" [class.expanded]="isSidebarCollapsed()" [class.mobile-view]="isMobile()"
        [class.no-sidebar]="!showSidebar()">
        <router-outlet></router-outlet>
    </main>
</div>

<!-- Global Quick Add Modal -->
<div class="modal-backdrop" *ngIf="isModalOpen" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
        <div class="flex-between mb-4">
            <h3 class="text-xl font-bold">Quick Add Transaction</h3>
            <button (click)="closeModal()" class="btn-icon text-muted hover:text-danger"><i
                    class="fa-solid fa-times"></i></button>
        </div>

        <div class="form-group mb-3">
            <label class="block text-sm font-medium text-muted mb-1">Type</label>
            <div class="flex gap-2">
                <button class="btn flex-1" [ngClass]="newTransaction.type === 'income' ? 'btn-primary' : 'btn-light'"
                    (click)="onTypeChange('income')">Income</button>
                <button class="btn flex-1" [ngClass]="newTransaction.type === 'expense' ? 'btn-danger' : 'btn-light'"
                    (click)="onTypeChange('expense')">Expense</button>
            </div>
        </div>

        <div class="form-group mb-3">
            <label class="block text-sm font-medium text-muted mb-1">Title</label>
            <input type="text" [(ngModel)]="newTransaction.title" class="input-premium"
                placeholder="e.g. Lunch, Salary">
        </div>

        <div class="form-group mb-3">
            <label class="block text-sm font-medium text-muted mb-1">Amount</label>
            <input type="number" [(ngModel)]="newTransaction.amount" class="input-premium" placeholder="0.00">
        </div>

        <div class="form-group mb-3">
            <label class="block text-sm font-medium text-muted mb-1">Category</label>
            <select [(ngModel)]="newTransaction.category" class="input-premium">
                <option *ngFor="let cat of categories" [value]="cat.name">{{ cat.name }}</option>
                <option *ngIf="categories.length === 0" value="General">General</option>
            </select>
        </div>

        <div class="form-group mb-4">
            <label class="block text-sm font-medium text-muted mb-1">Date</label>
            <input type="date" [(ngModel)]="newTransaction.date" class="input-premium">
        </div>

        <button (click)="submitTransaction()" class="btn w-full"
            [ngClass]="newTransaction.type === 'income' ? 'btn-primary' : 'btn-danger'">
            Save {{ newTransaction.type | titlecase }}
        </button>
    </div>
</div>
